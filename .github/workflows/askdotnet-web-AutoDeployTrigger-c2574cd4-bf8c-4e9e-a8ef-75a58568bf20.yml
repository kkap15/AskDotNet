name: Trigger auto deployment for askdotnet-web

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/askdotnet-web-AutoDeployTrigger-c2574cd4-bf8c-4e9e-a8ef-75a58568bf20.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ASKDOTNETWEB_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ASKDOTNETWEB_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ASKDOTNETWEB_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: askdotnetacr.azurecr.io
          registryUsername: ${{ secrets.ASKDOTNETWEB_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ASKDOTNETWEB_REGISTRY_PASSWORD }}
          containerAppName: askdotnet-web
          resourceGroup: askdotnet-rg
          imageToBuild: askdotnetacr.azurecr.io/askdotnet-web:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


